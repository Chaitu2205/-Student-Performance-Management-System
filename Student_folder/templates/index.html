<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .input-box label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #ddd;
            transition: 0.3s;
            pointer-events: none;
        }

        .input-box input:focus + label,
        .input-box input:valid + label {
            top: -8px;
            font-size: 12px;
            color: #00f2fe;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00f2fe;
        }

        .section {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎓 Student Result System</h1>

    <!-- ADD STUDENT -->
    <div class="section">
        <form action="/add" method="post">

            <div class="input-box">
                <input type="number" name="roll" required>
                <label>Roll Number</label>
            </div>

            <div class="input-box">
                <input type="text" name="name" required>
                <label>Student Name</label>
            </div>

            <div class="input-box">
                <input type="number" name="m1" required>
                <label>Maths Marks</label>
            </div>

            <div class="input-box">
                <input type="number" name="m2" required>
                <label>Physics Marks</label>
            </div>

            <div class="input-box">
                <input type="number" name="m3" required>
                <label>Chemistry Marks</label>
            </div>

            <button>Add Student</button>
        </form>
    </div>

    <!-- SEARCH STUDENT -->
    <div class="section">
        <form action="/search" method="post">
            <div class="input-box">
                <input type="number" name="roll" required>
                <label>Search Roll Number</label>
            </div>
            <button>Search</button>
        </form>
    </div>

</div>

</body>
</html>
